<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HelpTruth — Logg inn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#F9FBFF;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:36px;text-decoration:none;
}
.logo-mark{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(145deg,#4677FF,#1D4ED8);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(53,109,255,0.28);
}
.logo-mark svg{width:22px;height:22px}
.logo-name{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,#1E3A8A,#356DFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card{
  width:420px;max-width:100%;
  background:#fff;border:1px solid #E2E8F0;
  border-radius:24px;padding:40px 32px;
  box-shadow:0 16px 40px rgba(15,23,42,0.06);
}
.card h1{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:800;
  color:#0F172A;margin-bottom:24px;text-align:center;
}
.field{margin-bottom:14px}
.field input{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1.5px solid #E2E8F0;background:#F8FAFC;
  font-size:15px;font-family:'Inter',sans-serif;
  color:#0F172A;outline:none;transition:border-color .2s;
}
.field input:focus{border-color:#356DFF}
.field input::placeholder{color:#94A3B8}
.error{
  display:none;margin-bottom:14px;padding:12px 16px;
  border-radius:10px;background:#FEF2F2;border:1px solid #FECACA;
  color:#DC2626;font-size:14px;text-align:center;
}
.btn-submit{
  width:100%;padding:14px;border-radius:999px;border:none;
  background:linear-gradient(180deg,#4677FF,#356DFF);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;
  box-shadow:0 10px 24px rgba(53,109,255,0.20);
  transition:all .2s;margin-top:6px;
}
.btn-submit:hover{box-shadow:0 14px 30px rgba(53,109,255,0.28);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:wait}
.link{
  text-align:center;margin-top:20px;font-size:14px;color:#5B6B84;
}
.link a{color:#356DFF;font-weight:600;text-decoration:none}
.link a:hover{text-decoration:underline}
</style>
</head>
<body>

<a href="/" class="logo">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="m21 21-3.5-3.5"/><path d="M11 8v3l1.5 1.5"/>
    </svg>
  </div>
  <span class="logo-name">HELPTRUTH</span>
</a>

<div class="card">
  <h1>Logg inn</h1>
  <div class="error" id="error"></div>
  <div class="field"><input type="email" id="email" placeholder="E-postadresse" required></div>
  <div class="field"><input type="password" id="password" placeholder="Passord" required></div>
  <button class="btn-submit" id="btn" onclick="login()">Logg inn</button>
  <div class="link">Har du ikke konto? <a href="/register.html">Opprett bruker</a></div>
</div>

<script>
async function login(){
  var err=document.getElementById('error');
  var btn=document.getElementById('btn');
  err.style.display='none';
  btn.disabled=true;btn.textContent='Logger inn...';
  try{
    var res=await fetch('https://helptruth-backend.onrender.com/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:document.getElementById('email').value.trim(),
        password:document.getElementById('password').value
      })
    });
    var data=await res.json();
    if(!res.ok){err.textContent=data.error||'Feil e-post eller passord';err.style.display='block';return}
    localStorage.setItem('helptruth_token',data.token);
    window.location.href='https://app.helptruth.com';
  }catch(e){
    err.textContent='Nettverksfeil — prøv igjen';err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='Logg inn';
  }
}
document.querySelectorAll('input').forEach(function(i){i.addEventListener('keydown',function(e){if(e.key==='Enter')login()})});
</script>
</body>
</html>
