<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HelpTruth — Opprett konto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#F9FBFF;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:36px;text-decoration:none;
}
.logo-mark{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(145deg,#4677FF,#1D4ED8);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(53,109,255,0.28);
}
.logo-mark svg{width:22px;height:22px}
.logo-name{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,#1E3A8A,#356DFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card{
  width:420px;max-width:100%;
  background:#fff;border:1px solid #E2E8F0;
  border-radius:24px;padding:40px 32px;
  box-shadow:0 16px 40px rgba(15,23,42,0.06);
}
.card h1{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:800;
  color:#0F172A;margin-bottom:24px;text-align:center;
}
.field{margin-bottom:14px}
.field input{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1.5px solid #E2E8F0;background:#F8FAFC;
  font-size:15px;font-family:'Inter',sans-serif;
  color:#0F172A;outline:none;transition:border-color .2s;
}
.field input:focus{border-color:#356DFF}
.field input::placeholder{color:#94A3B8}
.error{
  display:none;margin-bottom:14px;padding:12px 16px;
  border-radius:10px;background:#FEF2F2;border:1px solid #FECACA;
  color:#DC2626;font-size:14px;text-align:center;
}
.btn-submit{
  width:100%;padding:14px;border-radius:999px;border:none;
  background:linear-gradient(180deg,#4677FF,#356DFF);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;
  box-shadow:0 10px 24px rgba(53,109,255,0.20);
  transition:all .2s;margin-top:6px;
}
.btn-submit:hover{box-shadow:0 14px 30px rgba(53,109,255,0.28);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:wait}
.link{
  text-align:center;margin-top:20px;font-size:14px;color:#5B6B84;
}
.link a{color:#356DFF;font-weight:600;text-decoration:none}
.link a:hover{text-decoration:underline}
</style>
</head>

  <div class="field"><input type="password" id="password" placeholder="Passord (min. 8 tegn)" required></div>
  <div class="field"><input type="password" id="password2" placeholder="Bekreft passord" required></div>
  <div class="field"><input type="text" id="invite_code" placeholder="Invitasjonskode" required></div>
  <button class="btn-submit" id="btn" onclick="register()">Opprett bruker</button>
  <div class="link">Har du allerede en konto? <a href="/login.html">Logg inn</a></div>
</div>

<script>
async function register(){
  var err=document.getElementById('error');
  var btn=document.getElementById('btn');
  err.style.display='none';

  var pw=document.getElementById('password').value;
  var pw2=document.getElementById('password2').value;
  if(pw!==pw2){err.textContent='Passordene stemmer ikke overens';err.style.display='block';return}

  btn.disabled=true;btn.textContent='Oppretter...';
  try{
    var res=await fetch('https://helptruth-backend.onrender.com/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name:document.getElementById('name').value.trim(),
        handle:document.getElementById('handle').value.trim(),
        email:document.getElementById('email').value.trim(),
        password:pw,
        invite_code:document.getElementById('invite_code').value.trim()
      })
    });
    var data=await res.json();
    if(!res.ok){err.textContent=data.error||'Noe gikk galt';err.style.display='block';return}
    if(data.token)localStorage.setItem('helptruth_token',data.token);
    alert(data.message||'Konto opprettet!');
    window.location.href='https://app.helptruth.com';
  }catch(e){
    err.textContent='Nettverksfeil — prøv igjen';err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='Opprett bruker';
  }
}
document.querySelectorAll('input').forEach(function(i){i.addEventListener('keydown',function(e){if(e.key==='Enter')register()})});
</script>
</body>
</html>
